# URSA-OSCAR web container — serves the React SPA and proxies /api/v1/* + /healthz
# to the API container over kairos-net. Mirrors APEX's web/nginx.conf pattern.

# Use Docker's embedded DNS resolver so nginx re-resolves the upstream at
# runtime instead of caching the IP at config-load. Without this, when any
# container on kairos-net restarts, nginx may hold a stale IP that now points
# at a different service. APEX hit that exact bug with apex-api / apex-mcp;
# we inherit the resolver=127.0.0.11 + proxy_pass-via-variable fix verbatim.
resolver 127.0.0.11 valid=30s ipv6=off;

# Map a variable so nginx defers DNS resolution to request time. proxy_pass
# with a variable also disables nginx's URI-substitution, so we must NOT
# include a URI suffix on the proxy_pass line — original $uri forwards
# verbatim to ursa-oscar-api.
map "" $ursa_api_upstream { default "ursa-oscar-api"; }

server {
    listen 80;
    server_name _;

    # Folder-upload import (Phase 3 Item 2) sends a multipart POST containing
    # the entire DATALOG tree — a ResMed AirSense SD card with several months
    # of nightly data is typically 200-800 MB. Default nginx client_max_body_size
    # is 1 MB, which makes the upload UI 413 on any real card. Bump to 5 GB
    # (covers ~3 years of accumulated DATALOG) and extend the body-read timeout
    # so slow USB-card-readers over LAN don't trip the default 60 s read window.
    client_max_body_size 5000m;
    client_body_timeout 600s;

    # Static SPA bundle (Vite build output)
    root /usr/share/nginx/html;
    index index.html;

    # SPA history-API fallback — every non-file route falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — /api/v1/* hits the API container directly.
    location /api/ {
        proxy_pass http://$ursa_api_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;       # imports can take a minute

        # 0.9.1 web fix — disable buffering across the entire API surface.
        # Required for /api/v1/ai/chat (SSE) to stream in real time;
        # without it nginx holds the entire response until the connection
        # closes and the chat panel shows "running…" forever even though
        # the server-side stream is done in seconds.
        # Also eliminates the "upstream response buffered to temp file"
        # warning on the 2.5 MB timeseries response — that gets served
        # streamed straight through now. Smaller responses (nights,
        # events, profile, etc.) are unaffected.
        # Pair with HTTP/1.1 + Connection close to prevent any keep-alive
        # weirdness on the SSE long-poll path.
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
    }

    # Healthz proxy — operationally useful for external monitors hitting the
    # web port to confirm the API is reachable too.
    location = /healthz {
        proxy_pass http://$ursa_api_upstream:8000;
        proxy_set_header Host $host;
    }

    # Lightweight cache headers for the SPA bundle (build artefacts are
    # content-hashed by Vite so they're safe to cache aggressively).
    location ~* \.(?:js|css|woff2?|svg|ico|png)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
