# URSA-OSCAR — public reference compose
# ==========================================================================
# This file is designed so a brand-new user can get the stack running with
# the minimum possible edits. You should only need to change TWO things:
#
#   1. The host path where URSA-OSCAR stores its data (the /data bind mount)
#   2. The host path where your CPAP backup lives (the /cpap-import bind mount)
#
# Everything else is set to sensible defaults. Then:
#
#   docker compose pull
#   docker compose up -d
#   open http://localhost:5063
#
# The full step-by-step install for your platform is at:
#
#   Windows:        Docs/install/windows.md
#   Linux:          Docs/install/linux.md
#   macOS:          Docs/install/macos.md
#   TrueNAS:        Docs/install/truenas.md
#   New to Docker?  Docs/install/concepts.md
#
# ==========================================================================
# Bind-mount paths — examples per platform
# ==========================================================================
# Linux / TrueNAS / Synology:
#   - /srv/ursa-oscar/data:/data
#   - /srv/ursa-oscar/cpap-import:/cpap-import:ro
#
# Windows (Docker Desktop with WSL2):
#   - C:\URSA-OSCAR\data:/data
#   - C:\Users\<your-username>\Documents\OSCAR_Data:/cpap-import:ro
#
# macOS (Docker Desktop):
#   - /Users/<your-username>/URSA-OSCAR/data:/data
#   - /Users/<your-username>/Documents/OSCAR_Data:/cpap-import:ro
#
# Pick the pattern for your OS and use those paths in the volumes blocks
# below. The directories don't need to exist beforehand — Docker will
# create them on first start (except on Windows, where you should create
# the data directory yourself first to avoid permission issues).
# ==========================================================================

services:
  ursa-oscar-api:
    image: brain40/ursa-oscar-api:1.1.12
    container_name: ursa-oscar-api
    environment:
      URSA_OSCAR_DB_PATH: /data/ursa-oscar.duckdb
      URSA_OSCAR_IMPORT_WATCH_PATH: /cpap-import
      URSA_OSCAR_EXPORTS_PATH: /data/exports
      # The api container can show a Settings page chip for the MCP
      # container's version + config. These three vars are only needed
      # if you enable the optional MCP service block at the bottom of
      # this file. Leave them unset for a pure-analytics install.
      URSA_OSCAR_MCP_INTERNAL_URL: http://ursa-oscar-mcp:8000
      URSA_OSCAR_MCP_BASE_URL: ${URSA_OSCAR_MCP_BASE_URL:-}
      URSA_OSCAR_MCP_BEARER_TOKEN: ${URSA_OSCAR_MCP_BEARER_TOKEN:-}
      URSA_OSCAR_MCP_OAUTH_CLIENT_ID: ${URSA_OSCAR_MCP_OAUTH_CLIENT_ID:-}
      URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET: ${URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET:-}
      # JWT signing secret. OPTIONAL: if unset, the API auto-generates a
      # per-instance secret at /data/jwt_secret on first boot (mode 0600).
      # Set explicitly only if you want to manage rotation yourself.
      URSA_OSCAR_JWT_SECRET: ${URSA_OSCAR_JWT_SECRET:-}
    volumes:
      # EDIT THESE TWO LINES for your platform (see comment block above).
      - /srv/ursa-oscar/data:/data
      - /srv/ursa-oscar/cpap-import:/cpap-import:ro
    restart: unless-stopped

  ursa-oscar-web:
    image: brain40/ursa-oscar-web:1.1.12
    container_name: ursa-oscar-web
    ports:
      # Web UI on host port 5063. Change the LEFT side (5063) if that
      # port is already in use on your machine; the RIGHT side (80)
      # must stay as 80.
      - "5063:80"
    restart: unless-stopped
    depends_on:
      - ursa-oscar-api

  ursa-oscar-watcher:
    image: brain40/ursa-oscar-watcher:1.1.12
    container_name: ursa-oscar-watcher
    environment:
      # Outgoing API bearer token. OPTIONAL override; when unset, the
      # watcher auto-reads /data/service_tokens/watcher.jwt which the
      # API container auto-mints + auto-rotates on first boot.
      URSA_OSCAR_WATCHER_TOKEN: ${URSA_OSCAR_WATCHER_TOKEN:-}
    volumes:
      # EDIT THESE TWO LINES for your platform (see comment block above).
      - /srv/ursa-oscar/data:/data
      - /srv/ursa-oscar/cpap-import:/cpap-import:ro
    restart: unless-stopped
    depends_on:
      - ursa-oscar-api

  # ==========================================================================
  # OPTIONAL — external AI connector (claude.ai Custom Connector)
  # ==========================================================================
  # The four containers above are the analytics stack. They give you:
  #   - Web UI on http://localhost:5063
  #   - Daily View + Trends + Reports
  #   - In-app AI assistant (bring your own API key)
  #   - Automated CPAP imports from the bind-mounted folder
  #
  # The MCP container is a SEPARATE thing: it exposes URSA-OSCAR's data
  # to external AI clients like claude.ai (via Custom Connector) over a
  # public URL with OAuth 2.1 + PKCE. You only need this if you want
  # claude.ai (or Claude Code, or another MCP client) to reach your
  # URSA-OSCAR data from outside your home network.
  #
  # If you only want the in-app AI assistant, you DO NOT need this.
  # Leave it commented out.
  #
  # To enable it: uncomment the entire block below, generate the three
  # required secrets, and put them in a .env file next to this compose
  # file (see Docs/install/mcp-optional-addon.md for the walkthrough).
  # ==========================================================================
  #
  # ursa-oscar-mcp:
  #   image: brain40/ursa-oscar-mcp:1.1.12
  #   container_name: ursa-oscar-mcp
  #   environment:
  #     URSA_OSCAR_API_URL: http://ursa-oscar-api:8000
  #     URSA_OSCAR_MCP_BEARER_TOKEN: ${URSA_OSCAR_MCP_BEARER_TOKEN}
  #     URSA_OSCAR_MCP_BASE_URL: ${URSA_OSCAR_MCP_BASE_URL}
  #     URSA_OSCAR_MCP_OAUTH_CLIENT_ID: ${URSA_OSCAR_MCP_OAUTH_CLIENT_ID}
  #     URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET: ${URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET}
  #     URSA_OSCAR_JWT_SECRET: ${URSA_OSCAR_JWT_SECRET:-}
  #     URSA_OSCAR_MCP_API_TOKEN: ${URSA_OSCAR_MCP_API_TOKEN:-}
  #     # 1.1.9 SECURITY — DCR is now off by default. Leave unset unless
  #     # your MCP URL is behind edge auth (e.g. Cloudflare Access). With
  #     # DCR off, anyone reaching /register gets a 404; only the pre-
  #     # registered claude.ai client (gated by the client_secret you set
  #     # above) can complete the OAuth flow.
  #     # URSA_OSCAR_MCP_DCR: "true"
  #     # 1.1.9 — allow additional redirect URIs on the pre-registered
  #     # client. Lets non-claude.ai MCP clients (KAIROS, etc.) connect
  #     # via the shared client_secret without needing DCR.
  #     # Comma-separated list of full callback URLs.
  #     URSA_OSCAR_MCP_EXTRA_REDIRECT_URIS: ${URSA_OSCAR_MCP_EXTRA_REDIRECT_URIS:-}
  #   ports:
  #     - "8085:8000"
  #   volumes:
  #     # EDIT THIS LINE for your platform (see comment block at top).
  #     # MCP needs :rw to persist DCR-registered OAuth clients.
  #     - /srv/ursa-oscar/data:/data
  #   restart: unless-stopped
  #   depends_on:
  #     - ursa-oscar-api
