version: '3.8'

# Production stack for the homelab. Mirrors APEX's production-compose
# convention: real paths + hostnames are hardcoded here; only secrets live
# in Dockge's environment editor and are referenced via ${VAR}.

networks:
  kairos-net:
    external: true

services:
  ursa-oscar-api:
    image: brain40/ursa-oscar-api:1.1.5
    container_name: ursa-oscar-api
    environment:
      URSA_OSCAR_DB_PATH: /data/ursa-oscar.duckdb
      URSA_OSCAR_IMPORT_WATCH_PATH: /cpap-import
      URSA_OSCAR_EXPORTS_PATH: /data/exports
      # Phase-2-polish Item 5 (Settings page): mirrored from the MCP
      # container so the API can show a masked view at
      # GET /api/v1/system/config and drive POST /api/v1/system/verify-mcp.
      URSA_OSCAR_MCP_INTERNAL_URL: http://ursa-oscar-mcp:8000
      URSA_OSCAR_MCP_BASE_URL: ${URSA_OSCAR_MCP_BASE_URL:-https://your-public-host.example.com}
      URSA_OSCAR_MCP_BEARER_TOKEN: ${URSA_OSCAR_MCP_BEARER_TOKEN}
      URSA_OSCAR_MCP_OAUTH_CLIENT_ID: ${URSA_OSCAR_MCP_OAUTH_CLIENT_ID}
      URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET: ${URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET}
      # Phase 6.4 — JWT signing secret. Shared with the MCP container
      # so it can verify operator-issued JWTs as bearer tokens.
      # OPTIONAL: if unset, the API auto-generates a per-instance secret
      # at /data/jwt_secret on first boot (mode 0600). Set explicitly
      # only when you want to manage rotation yourself.
      URSA_OSCAR_JWT_SECRET: ${URSA_OSCAR_JWT_SECRET:-}
      # 1.1.5 — version chips are now self-introspecting. The API reads
      # its own version from packaging metadata, queries the MCP
      # container's /version endpoint, reads the watcher's
      # /data/versions/watcher.txt (written at watcher startup), and the
      # web bundle bakes its version at Vite build time. Operators no
      # longer keep image tags and display env vars in sync. The previous
      # URSA_OSCAR_{,MCP_,WEB_,WATCHER_}IMAGE_VERSION env vars are
      # retained as optional explicit overrides for testing scenarios.
    networks:
      - kairos-net
    volumes:
      - /srv/ursa-oscar/data:/data
      - /srv/ursa-oscar/cpap-import:/cpap-import:ro
    restart: unless-stopped

  ursa-oscar-mcp:
    image: brain40/ursa-oscar-mcp:1.1.5
    container_name: ursa-oscar-mcp
    environment:
      # MCP reads from the API container over kairos-net (no direct DuckDB
      # access; DuckDB's cross-process lock model prevents that).
      URSA_OSCAR_API_URL: http://ursa-oscar-api:8000
      # Required: bearer token for SSE auth. Missing -> container exits with ERROR.
      #   python -c "import secrets; print(secrets.token_urlsafe(32))"
      URSA_OSCAR_MCP_BEARER_TOKEN: ${URSA_OSCAR_MCP_BEARER_TOKEN}
      # Override in Dockge env editor with your real public hostname.
      # Wrong value -> claude.ai's OAuth discovery returns wrong endpoint URLs.
      URSA_OSCAR_MCP_BASE_URL: ${URSA_OSCAR_MCP_BASE_URL:-https://your-public-host.example.com}
      # Required: pre-registered OAuth client (DCR disabled).
      #   python -c "import secrets; print(secrets.token_urlsafe(16))"   # ID
      #   python -c "import secrets; print(secrets.token_urlsafe(32))"   # SECRET
      URSA_OSCAR_MCP_OAUTH_CLIENT_ID: ${URSA_OSCAR_MCP_OAUTH_CLIENT_ID}
      URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET: ${URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET}
      # Phase 6.4 — JWT signing secret shared with the API. Used to
      # VERIFY operator-issued JWTs presented to /sse as bearer tokens.
      # OPTIONAL: when unset, the MCP container falls back to
      # /data/jwt_secret (auto-shared via the mounted data volume).
      URSA_OSCAR_JWT_SECRET: ${URSA_OSCAR_JWT_SECRET:-}
      # Phase 6.4.1 — outgoing API bearer token. OPTIONAL override; when
      # unset, the MCP container auto-reads /data/service_tokens/mcp.jwt
      # which the API container auto-mints + auto-rotates. Set explicitly
      # only when you want manual control over the service credential.
      URSA_OSCAR_MCP_API_TOKEN: ${URSA_OSCAR_MCP_API_TOKEN:-}
    networks:
      - kairos-net
    ports:
      # Host 8085 (8082 is taken on kairos-net by localrecall) -> container 8000
      - "8085:8000"
    volumes:
      # 1.1.5 — MCP needs /data:rw (was :ro) to persist DCR-registered
      # OAuth clients to /data/mcp_oauth_clients.json. Same trust model
      # as the API and watcher containers (both already :rw); the /data
      # dir is operator-owned on a private LAN volume.
      - /srv/ursa-oscar/data:/data
    restart: unless-stopped
    depends_on:
      - ursa-oscar-api

  ursa-oscar-web:
    image: brain40/ursa-oscar-web:1.1.5
    container_name: ursa-oscar-web
    networks:
      - kairos-net
    ports:
      - "5063:80"
    restart: unless-stopped

  ursa-oscar-watcher:
    image: brain40/ursa-oscar-watcher:1.1.5
    container_name: ursa-oscar-watcher
    environment:
      # Phase 6.4.1 — outgoing API bearer token. OPTIONAL override; when
      # unset, the watcher auto-reads /data/service_tokens/watcher.jwt
      # which the API container auto-mints + auto-rotates. Set explicitly
      # only when you want manual control over the service credential.
      URSA_OSCAR_WATCHER_TOKEN: ${URSA_OSCAR_WATCHER_TOKEN:-}
    networks:
      - kairos-net
    volumes:
      - /srv/ursa-oscar/data:/data
      - /srv/ursa-oscar/cpap-import:/cpap-import:ro
    restart: unless-stopped
    depends_on:
      - ursa-oscar-api
