version: '3.8'

networks:
  kairos-net:
    external: true

services:
  ursa-oscar-api:
    image: ${DOCKERHUB_USER:-brain40}/ursa-oscar-api:${URSA_OSCAR_API_IMAGE_VERSION:-1.1.3}
    container_name: ursa-oscar-api
    environment:
      URSA_OSCAR_DB_PATH: /data/ursa-oscar.duckdb
      URSA_OSCAR_IMPORT_WATCH_PATH: /cpap-import
      URSA_OSCAR_EXPORTS_PATH: /data/exports
      # Phase-2-polish Item 5 — Settings page surface. Mirrored from MCP.
      URSA_OSCAR_MCP_INTERNAL_URL: http://ursa-oscar-mcp:8000
      URSA_OSCAR_MCP_BASE_URL: ${URSA_OSCAR_MCP_BASE_URL}
      URSA_OSCAR_MCP_BEARER_TOKEN: ${URSA_OSCAR_MCP_BEARER_TOKEN}
      URSA_OSCAR_MCP_OAUTH_CLIENT_ID: ${URSA_OSCAR_MCP_OAUTH_CLIENT_ID}
      URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET: ${URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET}
      # Phase 6.4 — optional JWT signing secret. When unset, the API
      # auto-generates /data/jwt_secret on first boot. Set explicitly
      # only when managing rotation yourself.
      URSA_OSCAR_JWT_SECRET: ${URSA_OSCAR_JWT_SECRET:-}
      # 1.1.3 — version chips are now self-introspecting. The API
      # reads its own version from packaging metadata, queries the MCP
      # container's /version endpoint, reads the watcher's startup-
      # written /data/versions/watcher.txt, and the web bundle bakes
      # its version in at Vite build time. No env-var coordination
      # required for the common case. Operators who want to pin a
      # display value can still set URSA_OSCAR_{,MCP_,WEB_,WATCHER_}IMAGE_VERSION
      # explicitly — those override the introspected values.
    networks:
      - kairos-net
    volumes:
      - ${URSA_OSCAR_DATA_PATH}:/data
      - ${URSA_OSCAR_CPAP_IMPORT_PATH}:/cpap-import:ro
    restart: unless-stopped

  ursa-oscar-mcp:
    image: ${DOCKERHUB_USER:-brain40}/ursa-oscar-mcp:${URSA_OSCAR_MCP_IMAGE_VERSION:-1.1.3}
    container_name: ursa-oscar-mcp
    environment:
      URSA_OSCAR_API_URL: http://ursa-oscar-api:8000
      URSA_OSCAR_MCP_BEARER_TOKEN: ${URSA_OSCAR_MCP_BEARER_TOKEN}
      URSA_OSCAR_MCP_BASE_URL: ${URSA_OSCAR_MCP_BASE_URL}
      URSA_OSCAR_MCP_OAUTH_CLIENT_ID: ${URSA_OSCAR_MCP_OAUTH_CLIENT_ID}
      URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET: ${URSA_OSCAR_MCP_OAUTH_CLIENT_SECRET}
      # Phase 6.4 — verify operator JWTs presented as bearer tokens to /sse.
      URSA_OSCAR_JWT_SECRET: ${URSA_OSCAR_JWT_SECRET:-}
      # Phase 6.4.1 — outgoing API bearer token. OPTIONAL override; when
      # unset, the MCP container auto-reads /data/service_tokens/mcp.jwt
      # which the API container auto-mints on startup. Set explicitly
      # only when you want manual control over the service credential.
      URSA_OSCAR_MCP_API_TOKEN: ${URSA_OSCAR_MCP_API_TOKEN:-}
    networks:
      - kairos-net
    ports:
      - "${URSA_OSCAR_MCP_HOST_PORT:-8082}:8000"
    volumes:
      # Read /data/jwt_secret when URSA_OSCAR_JWT_SECRET isn't set
      # explicitly in env (auto-shared with the API container).
      - ${URSA_OSCAR_DATA_PATH}:/data:ro
    restart: unless-stopped
    depends_on:
      - ursa-oscar-api

  ursa-oscar-web:
    image: ${DOCKERHUB_USER:-brain40}/ursa-oscar-web:${URSA_OSCAR_WEB_IMAGE_VERSION:-1.1.3}
    container_name: ursa-oscar-web
    networks:
      - kairos-net
    ports:
      - "${URSA_OSCAR_WEB_HOST_PORT:-5063}:80"
    restart: unless-stopped

  ursa-oscar-watcher:
    image: ${DOCKERHUB_USER:-brain40}/ursa-oscar-watcher:${URSA_OSCAR_WATCHER_IMAGE_VERSION:-1.1.3}
    container_name: ursa-oscar-watcher
    environment:
      # Phase 4 Ticket 3 — async watcher loop. Polls the bind-mounted
      # CPAP source for new data, waits for filesystem quiescence, then
      # enqueues an async import via the API's /imports endpoint.
      URSA_OSCAR_API_URL: http://ursa-oscar-api:8000
      URSA_OSCAR_WATCH_PATH: /cpap-import
      # How often to scan the watch path (seconds). Default 30s.
      URSA_OSCAR_POLL_INTERVAL: ${URSA_OSCAR_WATCH_POLL_INTERVAL:-30}
      # How long the tree must be stable before triggering an import.
      # Protects against firing while a copy is still in progress.
      URSA_OSCAR_QUIESCENCE_SECONDS: ${URSA_OSCAR_WATCH_QUIESCENCE_SECONDS:-30}
      # Optional — webhook fires on each successful import. Wire it to
      # ntfy / Slack / Home Assistant / etc. Empty disables.
      URSA_OSCAR_IMPORT_WEBHOOK_URL: ${URSA_OSCAR_IMPORT_WEBHOOK_URL:-}
      # When true, every triggered import passes ?force=true so the API
      # re-parses every night. Default false — relies on skip_existing
      # to make the watcher's auto-triggers cheap. Set true only if
      # you're debugging the importer itself.
      URSA_OSCAR_FORCE_REIMPORT: ${URSA_OSCAR_WATCH_FORCE_REIMPORT:-false}
      # Phase 6.4.1 — outgoing API bearer token. OPTIONAL override; when
      # unset, the watcher auto-reads /data/service_tokens/watcher.jwt
      # which the API container auto-mints on startup. Set explicitly
      # only when you want manual control over the service credential.
      URSA_OSCAR_WATCHER_TOKEN: ${URSA_OSCAR_WATCHER_TOKEN:-}
    networks:
      - kairos-net
    volumes:
      - ${URSA_OSCAR_DATA_PATH}:/data
      - ${URSA_OSCAR_CPAP_IMPORT_PATH}:/cpap-import:ro
    restart: unless-stopped
    depends_on:
      - ursa-oscar-api
